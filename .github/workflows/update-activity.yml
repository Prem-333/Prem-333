name: Update GitHub Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

# THIS IS THE FIX: Grants the script permission to commit changes
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update README with recent activity
    
    steps:
      # Updated to v4 to fix the Node warning
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update README
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: automated GitHub activity update"
          MAX_LINES: 5
